"$schema" = "./node_modules/wrangler/config-schema.json"
name = "cloudflare-docker-proxy"
compatibility_date = "2023-12-01"
main = "src/index.js"

[dev]
ip = "0.0.0.0"
port = 8787
local_protocol = "http"

[vars]
CUSTOM_DOMAIN = "djwl.top"
MODE = "production"
TARGET_UPSTREAM = ""

[env.dev.vars]
MODE = "debug"
TARGET_UPSTREAM = "https://registry-1.docker.io"
CUSTOM_DOMAIN = "djwl.top"

[env.production]
name = "cloudflare-docker-proxy"
 routes = [
   { pattern = "docker.djwl.top", custom_domain = true },
  { pattern = "quay.djwl.top", custom_domain = true },
   { pattern = "gcr.djwl.top", custom_domain = true },
   { pattern = "k8s-gcr.djwl.top", custom_domain = true },
   { pattern = "k8s.djwl.top", custom_domain = true },
  { pattern = "ghcr.djwl.top", custom_domain = true },
  { pattern = "cloudsmith.djwl.top", custom_domain = true },
 ]

[env.production.vars]
MODE = "production"
TARGET_UPSTREAM = ""
CUSTOM_DOMAIN = "djwl.top"

[env.staging]
name = "cloudflare-docker-proxy-staging"
# route = { pattern = "docker-staging.djwl.top", custom_domain = true }

[env.staging.vars]
MODE = "staging"
TARGET_UPSTREAM = ""
CUSTOM_DOMAIN = "djwl.top"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
